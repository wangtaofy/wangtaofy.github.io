# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
# 网站标题
title: Hexo
# 网站副标题
subtitle: ''
# 网站描述，通常用于SEO
description: ''
# 网站关键字
keywords:
# 文章作者
author: 会飞的鱼
# 语言
language: zh-Hans
# 时区
timezone: ''

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
# 网址
url: http://yoursite.com
# 网站根目录
root: /
# 文章的永久链接格式
permalink: :year/:month/:day/:title/
# 永久链接中各部分的默认值
permalink_defaults:
# 改写 permalink 的值来美化 URL
pretty_urls:
  # 是否在永久链接中保留尾部的 index.html
  trailing_index: true

# Directory
# 资源文件夹，用来存放内容。
source_dir: source
# 公共文件夹，用于存放生成的站点文件。
public_dir: public
# 标签文件夹
tag_dir: tags
# 归档文件夹
archive_dir: archives
# 分类文件夹
category_dir: categories
# Include code 文件夹，source_dir 下的子目录
code_dir: downloads/code
# 国际化（i18n）文件夹
i18n_dir: :lang
# 跳过指定文件的渲染。匹配到的文件将会被不做改动地复制到 public 目录中。
skip_render:

# Writing
# 新文章的文件名称
new_post_name: :title.md # File name of new posts
# 默认布局
default_layout: post
# 中文和英文之间加入空格
auto_spacing: true
# 标题转换为首字母大写
titlecase: false # Transform title into titlecase
external_link:
  # 在新标签中打开链接
  enable: true # Open external links in new tab
  # 对整个网站（site）生效或仅对文章（post）生效	
  field: site # Apply to the whole site
  # 需要排除的域名。主域名和子域名如 www 需分别配置	
  exclude: ''
# 把文件名称转换为 (1) 小写或 (2) 大写
filename_case: 0
# 显示草稿
render_drafts: false
# 启动 Asset 文件夹
post_asset_folder: true
# 把链接改为与根目录的相对位址
relative_link: false
# 显示未来的文章
future: true
# 代码块的设置
highlight:
  # 开启代码块高亮
  enable: true
  # 显示行数
  line_number: true
  # 如果未指定语言，则启用自动检测
  auto_detect: false
  # 用 n 个空格替换 tabs；如果值为空，则不会替换 tabs
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
# 默认分类
default_category: uncategorized
# 分类别名
category_map:
# 标签别名
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
# Meta generator 标签。 值为 false 时 Hexo 不会在头部插入该标签
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
# 日期格式
date_format: YYYY-MM-DD
# 时间格式
time_format: HH:mm:ss
## Use post's date for updated date unless set in front-matter
# 启用以后，如果 Front Matter 中没有指定 updated， post.updated 将会使用 date 的值而不是文件的创建时间
use_date_for_updated: true

# Pagination
## Set per_page to 0 to disable pagination
# 每页显示的文章量 (0 = 关闭分页功能)
per_page: 10
# 分页目录
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
# Hexo 默认会忽略隐藏文件和文件夹（包括名称以下划线和 . 开头的文件和文件夹，Hexo 的 _posts 和 _data 等目录除外）。通过设置此字段将使 Hexo 处理他们并将它们复制到 source 目录下。
include:
# Hexo 会忽略这些文件和目录
exclude:
# Ignore files/folders
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
# 当前主题名称。值为false时禁用主题
theme: next

# 主题的配置文件。在这里放置的配置会覆盖主题目录下的 _config.yml 中的配置
theme_config:

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repository: 
    github: git@home_github:wangtaofy/wangtaofy.github.io.git
